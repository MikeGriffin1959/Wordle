spring.application.name=wordle

# Profile is set externally: prod via setenv.bat CATALINA_OPTS on the 8080
# service, dev per-server on the Eclipse 8081 test server. Default to dev so
# bare launches (JUnit, spring-boot:run) hit wordle_test, never prod.
spring.profiles.default=dev

# Secrets (DB credentials) live outside the repo; never commit them.
spring.config.import=optional:file:///C:/WORDLE-secrets/secrets.properties

# JSP views
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Flyway owns the schema; Hibernate just maps it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
